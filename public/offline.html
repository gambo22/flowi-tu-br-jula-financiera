<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sin conexión — Flowi</title>
    <meta name="theme-color" content="#10B981">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #09090b; /* bg-background in dark mode style */
            color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background-color: #10B981;
            color: white;
            font-size: 40px;
            font-weight: 900;
            margin: 0 auto 2rem auto;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        p {
            color: #a1a1aa; /* muted-foreground */
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        button {
            background-color: #10B981;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #71717a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">F</div>
        <h1>Sin conexión a internet</h1>
        <p>Ups, parece que Flowi se quedó sin señal 📡. Por favor revisa tu conexión para seguir organizando tus finanzas.</p>
        <button onclick="window.location.reload()">Reintentar conexión</button>
        <div class="footer">Flowi no te juzga. Te acompaña. 💚</div>
    </div>
</body>
</html>
